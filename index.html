<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SXL2 智能爬楼监测系统</title>
    <style>
        :root {
            --primary: #2563eb;
            --ok: #16a34a;
            --warn: #d97706;
            --danger: #dc2626;
            --bg: #f3f4f6;
            --card: #ffffff;
            --text: #1f2937;
            --border: #e5e7eb;
        }

        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        h1 { margin: 0; color: var(--primary); }

        .panel {
            width: 100%;
            max-width: 1080px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
            box-sizing: border-box;
        }

        .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .grow { flex: 1; }

        input, select {
            padding: 8px 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
        }

        button {
            border: none;
            border-radius: 6px;
            color: #fff;
            padding: 9px 14px;
            cursor: pointer;
            font-weight: 600;
        }
        .btn-primary { background: var(--primary); }
        .btn-start { background: var(--ok); }
        .btn-stop { background: var(--danger); }
        .btn-reset { background: var(--warn); }

        .hidden { display: none; }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: bold;
            background: #eef2ff;
            color: #3730a3;
        }

        .status-running { color: var(--ok); font-weight: bold; }
        .status-stopped { color: var(--danger); font-weight: bold; }

        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 10px;
        }
        .metric {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }
        .metric .k { font-size: 12px; color: #6b7280; }
        .metric .v { font-size: 26px; color: var(--primary); font-weight: 700; }

        .wave-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .wave-card {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px;
        }

        canvas {
            width: 100%;
            height: 220px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: #fff;
        }

        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 8px; border-bottom: 1px solid var(--border); text-align: left; }
        th { background: #f9fafb; }

        #msg { min-height: 20px; color: #374151; font-size: 13px; }

        @media (max-width: 900px) {
            .wave-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<h1>智能楼梯爬行监测</h1>

<div class="panel" style="padding:10px 16px;">
    终端模拟端入口：<a href="/terminal" target="_blank">打开独立终端控制界面</a>
</div>

<div class="panel" id="login-panel">
    <h3>登录系统</h3>
    <div class="row">
        <input id="username" placeholder="用户名，如 admin" />
        <input id="password" type="password" placeholder="密码" />
        <button class="btn-primary" onclick="login()">登录</button>
    </div>
    <div style="margin-top:10px;font-size:13px;color:#4b5563;">
        默认账号：admin/admin123，monitor1/monitor123，collector1/collector123
    </div>
</div>

<div class="panel hidden" id="app-panel">
    <div class="row" style="justify-content: space-between;">
        <div>
            当前用户：<span id="login-user">-</span>
            <span class="badge" id="login-role">-</span>
        </div>
        <div>
            系统状态：<span id="run-status" class="status-stopped">已停止</span>
        </div>
    </div>
</div>

<div class="panel hidden" id="sim-panel">
    <h3>模拟端控制台</h3>
    <div class="row">
        <label>加载文件场景：</label>
        <select id="profile-select">
            <option value="mixed">混合运动数据（data1+data2）</option>
            <option value="upstairs3">上三楼数据（data1）</option>
        </select>
        <button class="btn-primary" onclick="loadProfile()">加载文件</button>
        <button class="btn-start" onclick="sendCommand('start')">开始</button>
        <button class="btn-stop" onclick="sendCommand('stop')">停止</button>
        <button class="btn-reset" onclick="sendCommand('reset')">重置</button>
    </div>
</div>

<div class="panel hidden" id="metrics-panel">
    <h3>爬楼结果</h3>
    <div class="metrics">
        <div class="metric"><div class="k">当前楼层</div><div class="v" id="floor-v">--</div></div>
        <div class="metric"><div class="k">已爬楼层</div><div class="v" id="climbed-v">--</div></div>
        <div class="metric"><div class="k">总步数</div><div class="v" id="steps-v">--</div></div>
        <div class="metric"><div class="k">角速度/加速度样本行</div><div class="v" id="lines-v">--</div></div>
    </div>
</div>

<div class="panel hidden" id="wave-panel">
    <h3>波形验证（确认爬楼精准性）</h3>
    <div class="wave-grid">
        <div class="wave-card">
            <div>加速度波形</div>
            <canvas id="accel-canvas" width="500" height="220"></canvas>
        </div>
        <div class="wave-card">
            <div>角速度波形</div>
            <canvas id="gyro-canvas" width="500" height="220"></canvas>
        </div>
    </div>
</div>

<div class="panel hidden" id="collectors-panel">
    <h3>采集对象列表（支持多个用户）</h3>
    <table>
        <thead><tr><th>ID</th><th>用户名</th><th>昵称</th></tr></thead>
        <tbody id="collectors-body"><tr><td colspan="3">加载中...</td></tr></tbody>
    </table>
</div>

<div class="panel hidden" id="history-panel">
    <h3>最近历史记录</h3>
    <table>
        <thead><tr><th>时间</th><th>楼层</th><th>步数</th><th>速度</th></tr></thead>
        <tbody id="history-body"><tr><td colspan="4">加载中...</td></tr></tbody>
    </table>
</div>

<div id="msg"></div>

<script>
    let authToken = '';
    let currentRole = '';

    function setMsg(text, isErr = false) {
        const el = document.getElementById('msg');
        el.textContent = text;
        el.style.color = isErr ? '#dc2626' : '#374151';
    }

    function apiFetch(path, options = {}) {
        options.headers = options.headers || {};
        if (authToken) {
            options.headers['X-Auth-Token'] = authToken;
        }
        return fetch(path, options);
    }

    async function login() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        const res = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });

        if (!res.ok) {
            setMsg('登录失败：用户名或密码错误', true);
            return;
        }

        const data = await res.json();
        authToken = data.token;
        currentRole = data.role;

        document.getElementById('login-user').textContent = data.username;
        document.getElementById('login-role').textContent = data.role;

        document.getElementById('login-panel').classList.add('hidden');
        document.getElementById('app-panel').classList.remove('hidden');
        document.getElementById('metrics-panel').classList.remove('hidden');
        document.getElementById('wave-panel').classList.remove('hidden');
        document.getElementById('history-panel').classList.remove('hidden');
        document.getElementById('collectors-panel').classList.remove('hidden');

        if (currentRole === 'admin' || currentRole === 'monitor') {
            document.getElementById('sim-panel').classList.remove('hidden');
        }

        setMsg(`登录成功，角色：${data.role}`);
        await fetchStatus();
        await fetchCollectors();
        await fetchHistory();
        startAutoRefresh();
    }

    async function sendCommand(cmd) {
        const res = await apiFetch('/' + cmd, { method: 'POST' });
        if (!res.ok) {
            const t = await res.text();
            setMsg('命令失败：' + t, true);
            return;
        }
        setMsg(`命令已执行：${cmd}`);
        await fetchStatus();
    }

    async function loadProfile() {
        const profile = document.getElementById('profile-select').value;
        const res = await apiFetch('/api/sim/load', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ profile })
        });

        if (!res.ok) {
            const t = await res.text();
            setMsg('加载失败：' + t, true);
            return;
        }

        const data = await res.json();
        setMsg('已加载场景：' + data.profile);
        await fetchStatus();
    }

    function drawWave(canvasId, values, color) {
        const canvas = document.getElementById(canvasId);
        const ctx = canvas.getContext('2d');
        const w = canvas.width;
        const h = canvas.height;

        ctx.clearRect(0, 0, w, h);
        ctx.strokeStyle = '#e5e7eb';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(0, h / 2);
        ctx.lineTo(w, h / 2);
        ctx.stroke();

        if (!values || values.length === 0) return;

        let min = Infinity;
        let max = -Infinity;
        for (const v of values) {
            if (v < min) min = v;
            if (v > max) max = v;
        }

        const range = Math.max(max - min, 1e-3);
        const stepX = w / Math.max(values.length - 1, 1);

        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.beginPath();
        values.forEach((v, i) => {
            const x = i * stepX;
            const y = h - ((v - min) / range) * (h - 10) - 5;
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        });
        ctx.stroke();
    }

    async function fetchStatus() {
        const res = await apiFetch('/api/status?t=' + Date.now());
        if (!res.ok) {
            setMsg('获取状态失败', true);
            return;
        }

        const data = await res.json();

        document.getElementById('run-status').textContent = data.running ? '运行中' : '已停止';
        document.getElementById('run-status').className = data.running ? 'status-running' : 'status-stopped';

        document.getElementById('floor-v').textContent = data.current_floor ?? '--';
        document.getElementById('climbed-v').textContent = data.climbed_floors ?? '--';
        document.getElementById('steps-v').textContent = data.steps ?? '--';
        document.getElementById('lines-v').textContent = data.file_lines ?? '--';

        if (data.profile) {
            document.getElementById('profile-select').value = data.profile;
        }

        drawWave('accel-canvas', data.accel_wave || [], '#2563eb');
        drawWave('gyro-canvas', data.gyro_wave || [], '#dc2626');
    }

    async function fetchHistory() {
        const res = await apiFetch('/api/history');
        if (!res.ok) return;

        const list = await res.json();
        const tbody = document.getElementById('history-body');
        if (!list || list.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4">暂无历史</td></tr>';
            return;
        }

        tbody.innerHTML = list.map(item =>
            `<tr><td>${item.time || ''}</td><td>${item.floor ?? '-'}</td><td>${item.step ?? '-'}</td><td>${Number(item.speed || 0).toFixed(2)}</td></tr>`
        ).join('');
    }

    async function fetchCollectors() {
        const res = await apiFetch('/api/collectors');
        if (!res.ok) return;

        const list = await res.json();
        const tbody = document.getElementById('collectors-body');
        if (!list || list.length === 0) {
            tbody.innerHTML = '<tr><td colspan="3">暂无采集对象</td></tr>';
            return;
        }

        tbody.innerHTML = list.map(item =>
            `<tr><td>${item.id}</td><td>${item.username}</td><td>${item.nickname || ''}</td></tr>`
        ).join('');
    }

    function startAutoRefresh() {
        setInterval(fetchStatus, 1000);
        setInterval(fetchHistory, 5000);
        setInterval(fetchCollectors, 8000);
    }
</script>
</body>
</html>
