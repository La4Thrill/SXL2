<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能楼梯攀爬模拟系统</title>
    <style>
        :root {
            --primary-color: #3498db;
            --success-color: #2ecc71;
            --warning-color: #f39c12;
            --danger-color: #e74c3c;
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 20px;
        }

        .control-panel {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            align-items: center;
            width: 100%;
            max-width: 1000px;
            justify-content: space-between;
        }

        .status-badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-running { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .status-stopped { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

        .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
        .dot.green { background-color: var(--success-color); box-shadow: 0 0 5px var(--success-color); }
        .dot.red { background-color: var(--danger-color); }

        .btn-group { display: flex; gap: 10px; }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        button:hover { transform: translateY(-2px); opacity: 0.9; }
        button:active { transform: translateY(0); }

        .btn-start { background-color: var(--success-color); }
        .btn-stop { background-color: var(--danger-color); }
        .btn-reset { background-color: var(--warning-color); }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-5px); }
        .card h3 { margin: 0 0 10px 0; color: #7f8c8d; font-size: 0.9rem; text-transform: uppercase; }
        .card .value { font-size: 2.2rem; font-weight: bold; color: var(--primary-color); }
        .card .unit { font-size: 0.9rem; color: #95a5a6; margin-top: 5px; }

        .history-section {
            width: 100%;
            max-width: 1000px;
            background: var(--card-bg);
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background-color: #f8f9fa; color: #7f8c8d; font-weight: 600; }
        tr:hover { background-color: #f1f1f1; }

        #error-msg {
            color: var(--danger-color);
            margin-top: 10px;
            font-weight: bold;
            display: none;
            text-align: center;
            width: 100%;
            max-width: 1000px;
        }
    </style>
</head>
<body>

<h1>🏢 智能楼梯攀爬模拟系统</h1>

<div id="error-msg">⚠️ 连接服务器失败，请检查后端是否运行...</div>

<!-- 控制面板 -->
<div class="control-panel">
    <div id="system-status" class="status-badge status-stopped">
        <span class="dot red"></span>
        <span id="status-text">系统已停止</span>
    </div>

    <div class="btn-group">
        <!-- 注意：这里绑定的是 sendCommand 函数 -->
        <button class="btn-start" onclick="sendCommand('start')">
            <span>▶</span> 开始模拟
        </button>
        <button class="btn-stop" onclick="sendCommand('stop')">
            <span>⏹</span> 停止
        </button>
        <button class="btn-reset" onclick="sendCommand('reset')">
            <span>↺</span> 重置数据
        </button>
    </div>
</div>

<!-- 仪表盘 -->
<div class="dashboard">
    <div class="card">
        <h3>当前楼层</h3>
        <div class="value" id="floor-val">--</div>
        <div class="unit">F</div>
    </div>
    <div class="card">
        <h3>累计攀爬</h3>
        <div class="value" id="step-val">--</div>
        <div class="unit">Layers</div>
    </div>
    <div class="card">
        <h3>运行速度</h3>
        <div class="value" id="speed-val">--</div>
        <div class="unit">m/min</div>
    </div>
    <div class="card">
        <h3>数据行数</h3>
        <div class="value" id="lines-val">--</div>
        <div class="unit">Lines</div>
    </div>
</div>

<!-- 历史记录 -->
<div class="history-section">
    <h3>📜 最近运行记录 (Top 10)</h3>
    <table>
        <thead>
        <tr>
            <th>时间</th>
            <th>楼层</th>
            <th>步数</th>
        </tr>
        </thead>
        <tbody id="history-body">
        <tr><td colspan="3" style="text-align:center;">加载中...</td></tr>
        </tbody>
    </table>
</div>

<script>
    // ==================== 调试日志：脚本加载成功 ====================
    console.log("✅ [JS] 脚本加载成功！准备初始化...");

    const API_DATA = '/api/status';
    const API_HISTORY = '/api/history';

    // ==================== 核心控制函数（带详细日志）====================
    async function sendCommand(cmd) {
        console.log(`🚀 [用户操作] 点击按钮，准备发送命令：/${cmd}`);

        try {
            const response = await fetch('/' + cmd, {
                method: 'POST'
            });

            if (response.ok) {
                console.log(`✅ [成功] 命令 /${cmd} 发送成功！状态码：${response.status}`);
                // 立即刷新状态
                fetchData();
            } else {
                console.error(`❌ [失败] 服务器返回错误：${response.status}`);
                alert(`命令执行失败: ${response.status}`);
            }
        } catch (error) {
            console.error(`💥 [网络错误] 无法连接服务器：`, error);
            alert('无法连接服务器，请检查后端是否运行！');
        }
    }

    // ==================== 更新状态指示灯 ====================
    function updateStatusUI(isRunning) {
        const badge = document.getElementById('system-status');
        const text = document.getElementById('status-text');
        const dot = badge.querySelector('.dot');

        if (isRunning) {
            badge.className = 'status-badge status-running';
            text.textContent = '系统运行中';
            dot.className = 'dot green';
            console.log("🟢 [状态] 系统已启动");
        } else {
            badge.className = 'status-badge status-stopped';
            text.textContent = '系统已停止';
            dot.className = 'dot red';
            console.log("🔴 [状态] 系统已停止");
        }
    }

    // ==================== 获取实时数据 ====================
    async function fetchData() {
        try {
            const response = await fetch(API_DATA + '?t=' + new Date().getTime());
            if (!response.ok) throw new Error('HTTP ' + response.status);

            const data = await response.json();
            console.log("📥 [数据] 收到新数据:", data);

            updateStatusUI(data.running);

            document.getElementById('floor-val').textContent = data.current_floor ?? '--';
            document.getElementById('step-val').textContent = data.climbed ?? '--';
            document.getElementById('speed-val').textContent = data.speed ? parseFloat(data.speed).toFixed(2) : '--';
            document.getElementById('lines-val').textContent = data.file_lines ?? '--';

            document.getElementById('error-msg').style.display = 'none';

        } catch (error) {
            console.warn("⚠️ [警告] 获取数据失败:", error);
            document.getElementById('error-msg').style.display = 'block';
        }
    }

    // ==================== 获取历史记录 ====================
    async function fetchHistory() {
        try {
            const response = await fetch(API_HISTORY);
            if (!response.ok) return;

            const data = await response.json();
            const tbody = document.getElementById('history-body');

            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;">暂无历史记录</td></tr>';
                return;
            }

            let html = '';
            data.forEach(item => {
                html += `<tr><td>${item.time || 'N/A'}</td><td>${item.floor || '-'}</td><td>${item.step || '-'}</td></tr>`;
            });
            tbody.innerHTML = html;

        } catch (error) {
            // 静默失败，不影响主流程
        }
    }

    // ==================== 初始化 ====================
    function init() {
        console.log("⏱️ [初始化] 启动定时刷新...");
        fetchData();
        fetchHistory();
        setInterval(fetchData, 1000);
        setInterval(fetchHistory, 5000);
    }

    // 启动
    init();
</script>
</body>
</html>
